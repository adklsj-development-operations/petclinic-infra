---
- name: Configure petclinic server
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Wait for SSH to be available
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name: [curl, ca-certificates, apt-transport-https, gnupg]
        state: present

    # Docker
    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
          https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    # Monitoring stack
    - name: Create monitoring config directories
      file:
        path: /opt/monitoring/grafana/provisioning/{{ item }}
        state: directory
        mode: "0755"
      loop:
        - datasources
        - dashboards
        - alerting

    - name: Copy Prometheus config
      copy:
        src: prometheus.yml
        dest: /opt/monitoring/prometheus.yml
        mode: "0644"

    - name: Copy Grafana datasource provisioning
      copy:
        src: grafana/provisioning/datasources/prometheus.yml
        dest: /opt/monitoring/grafana/provisioning/datasources/prometheus.yml
        mode: "0644"

    - name: Copy Grafana dashboard provisioning
      copy:
        src: grafana/provisioning/dashboards/dashboards.yml
        dest: /opt/monitoring/grafana/provisioning/dashboards/dashboards.yml
        mode: "0644"

    - name: Copy Grafana dashboard JSON
      copy:
        src: grafana/provisioning/dashboards/petclinic.json
        dest: /opt/monitoring/grafana/provisioning/dashboards/petclinic.json
        mode: "0644"

    - name: Copy monitoring docker-compose file
      copy:
        src: docker-compose.monitoring.yml
        dest: /opt/monitoring/docker-compose.yml
        mode: "0644"

    - name: Copy Grafana alerting provisioning
      copy:
        src: grafana/provisioning/alerting/{{ item }}
        dest: /opt/monitoring/grafana/provisioning/alerting/{{ item }}
        mode: "0644"
      loop:
        - contactpoints.yml
        - policies.yml
        - rules.yml

    - name: Start monitoring stack
      shell: docker compose -f /opt/monitoring/docker-compose.yml up -d
      args:
        chdir: /opt/monitoring
      environment:
        SLACK_WEBHOOK_URL: "{{ slack_webhook_url }}"
